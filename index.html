<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Tracker — Works Sweepstake (Shared)</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Anton&family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#07140f;--ink2:#0d2018;--panel:#102a20;--panel2:#0c2018;
    --line:rgba(229,228,210,.13);--cream:#f3efe2;--muted:#9bb0a6;--muted2:#6f8479;
    --gold:#f2c14e;--gold-deep:#d99b27;--pitch:#19d196;--pitch-deep:#0e9b6e;--red:#e8654f;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{background:var(--ink);color:var(--cream);font-family:'IBM Plex Sans',sans-serif;-webkit-font-smoothing:antialiased}
  body{
    min-height:100vh;
    background:
      radial-gradient(1100px 560px at 82% -8%, rgba(25,209,150,.10), transparent 60%),
      radial-gradient(900px 480px at -8% 108%, rgba(242,193,78,.07), transparent 55%),
      var(--ink);
    padding:0 0 48px;
  }
  .wrap{max-width:1080px;margin:0 auto;padding:0 clamp(12px,3.5vw,28px)}

  /* HEADER */
  header{padding:clamp(20px,4vw,34px) 0 0}
  .kicker{font-family:'IBM Plex Mono',monospace;font-size:11px;letter-spacing:.3em;text-transform:uppercase;color:var(--gold);display:flex;gap:11px;align-items:center}
  .kicker .dot{width:6px;height:6px;background:var(--pitch);border-radius:50%;box-shadow:0 0 9px var(--pitch)}
  h1{font-family:'Anton',sans-serif;font-weight:400;line-height:.9;letter-spacing:.01em;text-transform:uppercase;
     font-size:clamp(40px,10vw,84px);margin:.1em 0 .12em;
     background:linear-gradient(176deg,#fff 0%, var(--cream) 42%, var(--gold) 118%);
     -webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent}
  .sub{font-family:'IBM Plex Mono',monospace;font-size:clamp(10px,2.5vw,13px);color:var(--muted);letter-spacing:.05em}
  .sub b{color:var(--cream);font-weight:600}

  /* TABS + TOOLBAR */
  .bar{position:sticky;top:0;z-index:30;background:linear-gradient(180deg,var(--ink) 72%,transparent);padding:16px 0 12px;margin-top:14px}
  .tabs{display:flex;gap:8px;flex-wrap:wrap}
  .tab{font-family:'IBM Plex Mono',monospace;font-size:12px;letter-spacing:.12em;text-transform:uppercase;
    background:transparent;border:1px solid var(--line);color:var(--muted);padding:11px 16px;border-radius:99px;cursor:pointer;transition:.16s}
  .tab.on{background:var(--pitch);border-color:var(--pitch);color:#06140e;font-weight:600}
  .tab:not(.on):hover{border-color:var(--pitch);color:var(--cream)}
  .tools{display:flex;gap:6px;flex-wrap:wrap;margin-top:10px}
  .tbtn{font-family:'IBM Plex Mono',monospace;font-size:11px;letter-spacing:.08em;text-transform:uppercase;
    background:transparent;border:1px solid var(--line);color:var(--muted);padding:8px 12px;border-radius:8px;cursor:pointer;transition:.16s}
  .tbtn:hover{border-color:var(--gold);color:var(--gold)}
  .tbtn.danger:hover{border-color:var(--red);color:var(--red)}
  .tbtn.primary{border-color:var(--pitch);color:var(--pitch)}
  .tbtn.primary:hover{background:rgba(25,209,150,.12)}

  .legend{font-family:'IBM Plex Mono',monospace;font-size:10.5px;color:var(--muted2);letter-spacing:.04em;margin:6px 0 18px;display:flex;gap:14px;flex-wrap:wrap;align-items:center}
  .pill{display:inline-flex;align-items:center;gap:6px}
  .sw{width:9px;height:9px;border-radius:2px;display:inline-block}

  /* GROUPS */
  #groups{display:grid;gap:16px;grid-template-columns:repeat(auto-fill,minmax(310px,1fr))}
  .gcard{background:linear-gradient(180deg,var(--panel),var(--ink2));border:1px solid var(--line);border-radius:15px;overflow:hidden}
  .gcard::before{content:"";display:block;height:3px;background:linear-gradient(90deg,var(--pitch),var(--gold))}
  .gh{display:flex;align-items:baseline;justify-content:space-between;padding:15px 16px 10px}
  .gh h2{font-family:'Anton',sans-serif;font-weight:400;font-size:22px;letter-spacing:.03em;text-transform:uppercase}
  .gh .played{font-family:'IBM Plex Mono',monospace;font-size:10px;letter-spacing:.1em;color:var(--muted2)}

  table{width:100%;border-collapse:collapse}
  .standings{padding:0 8px}
  th{font-family:'IBM Plex Mono',monospace;font-weight:500;font-size:9.5px;letter-spacing:.06em;color:var(--muted2);text-transform:uppercase;padding:5px 4px;text-align:center}
  th.t{text-align:left;padding-left:8px}
  td{padding:7px 4px;text-align:center;font-size:13px;font-variant-numeric:tabular-nums;border-top:1px solid var(--line)}
  td.t{text-align:left;padding-left:6px}
  .pos{font-family:'Anton',sans-serif;font-size:13px;width:20px}
  .teamcell{display:flex;align-items:center;gap:8px;line-height:1.05}
  .teamcell .fl{height:15px;width:auto;flex:none;border-radius:2px;border:1px solid rgba(255,255,255,.14)}
  .teamcell .nm{font-weight:600;font-size:13px}
  .teamcell .ow{font-size:10.5px;color:var(--muted);font-family:'IBM Plex Mono',monospace}
  td.pts{font-weight:700;color:var(--gold)}
  tr.q td:first-child{box-shadow:inset 3px 0 0 var(--pitch)}
  tr.q3 td:first-child{box-shadow:inset 3px 0 0 var(--gold)}
  tr.out td:first-child{box-shadow:inset 3px 0 0 rgba(232,101,79,.55)}
  tr.out .nm,tr.out .fl{opacity:.55}

  /* FIXTURES */
  .fxtoggle{width:100%;background:rgba(0,0,0,.18);border:none;border-top:1px solid var(--line);color:var(--muted);
    font-family:'IBM Plex Mono',monospace;font-size:11px;letter-spacing:.1em;text-transform:uppercase;padding:11px;cursor:pointer;transition:.15s;display:flex;justify-content:center;gap:8px;align-items:center}
  .fxtoggle:hover{color:var(--cream)}
  .fx{display:none;padding:6px 12px 14px}
  .fx.open{display:block}
  .match{display:flex;align-items:center;gap:6px;padding:6px 0;border-bottom:1px solid var(--line)}
  .match:last-child{border-bottom:none}
  .side{display:flex;align-items:center;gap:6px;flex:1;min-width:0}
  .side.r{flex-direction:row-reverse;text-align:right}
  .side .fl{height:13px;width:auto;flex:none;border-radius:2px;border:1px solid rgba(255,255,255,.14)}
  .side .nm{font-size:12px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .score{width:34px;height:34px;flex:none;text-align:center;background:rgba(0,0,0,.3);border:1px solid var(--line);
    color:var(--cream);border-radius:8px;font-family:'IBM Plex Mono',monospace;font-size:15px;font-weight:600;outline:none}
  .score:focus{border-color:var(--pitch);box-shadow:0 0 0 2px rgba(25,209,150,.18)}
  .vs{font-family:'IBM Plex Mono',monospace;font-size:9px;color:var(--muted2);flex:none}

  /* PLAYERS */
  #players{display:none}
  #players.on{display:block}
  #groups.off{display:none}
  .pcard{background:linear-gradient(180deg,var(--panel),var(--ink2));border:1px solid var(--line);border-radius:13px;padding:13px 15px;margin-bottom:10px;display:flex;align-items:center;gap:14px}
  .prank{font-family:'Anton',sans-serif;font-size:26px;color:var(--gold-deep);width:34px;text-align:center;flex:none}
  .prank.top{color:var(--gold)}
  .pmid{flex:1;min-width:0}
  .pname{font-family:'Anton',sans-serif;font-size:20px;letter-spacing:.02em;text-transform:uppercase;margin-bottom:6px}
  .pteams{display:flex;gap:5px;flex-wrap:wrap}
  .tchip{display:inline-flex;align-items:center;gap:4px;font-size:11px;font-weight:500;padding:2.5px 7px;border-radius:6px;border:1px solid var(--line);background:rgba(0,0,0,.2)}
  .tchip .fl{height:11px;width:auto;border-radius:2px;border:1px solid rgba(255,255,255,.14);vertical-align:middle}
  .tchip.g{border-color:rgba(25,209,150,.5);background:rgba(25,209,150,.1)}
  .tchip.a{border-color:rgba(242,193,78,.5);background:rgba(242,193,78,.1)}
  .tchip.r{border-color:rgba(232,101,79,.4);opacity:.7}
  .pstat{text-align:right;flex:none}
  .pstat .pp{font-family:'Anton',sans-serif;font-size:30px;line-height:.9;color:var(--gold)}
  .pstat .pl{font-family:'IBM Plex Mono',monospace;font-size:9px;letter-spacing:.12em;text-transform:uppercase;color:var(--muted2)}
  .pstat .gd{font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--muted);margin-top:3px}

  .toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(20px);opacity:0;
    background:var(--pitch);color:#06140e;font-family:'IBM Plex Mono',monospace;font-size:13px;font-weight:600;
    padding:12px 22px;border-radius:99px;transition:.25s;z-index:60;pointer-events:none}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
  .note{font-family:'IBM Plex Mono',monospace;font-size:10.5px;color:var(--muted2);letter-spacing:.03em;line-height:1.6;margin:22px 2px 0}
  /* KNOCKOUTS */
  #knockouts{display:none}
  #knockouts.on{display:block}
  .champ{background:linear-gradient(135deg,var(--gold),var(--gold-deep));color:#06140e;border-radius:14px;padding:18px 20px;margin-bottom:18px;text-align:center}
  .champ .lbl{font-family:'IBM Plex Mono',monospace;font-size:11px;letter-spacing:.3em;text-transform:uppercase;opacity:.75}
  .champ .team{font-family:'Anton',sans-serif;font-size:30px;text-transform:uppercase;margin:5px 0;display:flex;gap:10px;align-items:center;justify-content:center}
  .champ .team .fl{height:24px;width:auto;border-radius:3px;border:1px solid rgba(0,0,0,.2)}
  .champ .who{font-weight:700;font-size:15px}
  .champ.pending{background:rgba(255,255,255,.03);border:1px dashed var(--line);color:var(--muted);font-family:'IBM Plex Mono',monospace;font-size:11.5px;letter-spacing:.02em;line-height:1.65;text-align:left}
  .kbtns{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:16px}
  .qpanel{background:linear-gradient(180deg,var(--panel),var(--ink2));border:1px solid var(--line);border-radius:13px;padding:14px 16px;margin-bottom:20px}
  .qpanel h3{font-family:'IBM Plex Mono',monospace;font-size:10.5px;letter-spacing:.18em;text-transform:uppercase;color:var(--muted);margin:0 0 9px}
  .qpanel .qnote{font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--muted2);letter-spacing:.02em;margin-top:4px;line-height:1.5}
  .qrow{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:10px}
  .kround{margin-bottom:22px}
  .kround h3{font-family:'Anton',sans-serif;font-size:18px;letter-spacing:.04em;text-transform:uppercase;margin-bottom:11px}
  .kgrid{display:grid;gap:10px;grid-template-columns:repeat(auto-fill,minmax(248px,1fr))}
  .kmatch{background:linear-gradient(180deg,var(--panel),var(--ink2));border:1px solid var(--line);border-radius:11px;overflow:hidden}
  .kside{display:flex;align-items:center;gap:8px;padding:9px 11px;transition:.14s;border-bottom:1px solid var(--line);min-height:40px}
  .kside:last-child{border-bottom:none}
  .kside.pickable{cursor:pointer}
  .kside.pickable:hover{background:rgba(25,209,150,.07)}
  .kside .fl{height:13px;width:auto;border-radius:2px;border:1px solid rgba(255,255,255,.14);flex:none}
  .kside .ktm{font-weight:600;font-size:13px}
  .kside .kow{font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--muted);margin-left:auto}
  .kside.w{background:rgba(25,209,150,.16)}
  .kside.w .ktm{color:var(--pitch)}
  .kside.l{opacity:.45}
  .kselect{flex:1;min-width:0;background:rgba(0,0,0,.3);border:1px solid var(--line);color:var(--cream);font-family:'IBM Plex Sans',sans-serif;font-size:12px;padding:6px 7px;border-radius:7px;outline:none}
  .kselect:focus{border-color:var(--pitch)}
  .kpick{margin-left:auto;width:24px;height:24px;border-radius:50%;border:1px solid var(--line);background:transparent;color:var(--muted);cursor:pointer;flex:none;font-size:10px;display:grid;place-items:center;transition:.14s}
  .kpick:hover{border-color:var(--pitch);color:var(--pitch)}
  .kside.w .kpick{background:var(--pitch);border-color:var(--pitch);color:#06140e}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="kicker"><span class="dot"></span> Works Sweepstake · Live Group Tracker</div>
    <h1>The Tracker</h1>
    <div class="sub">FIFA World Cup 2026 · <b>Group Stage</b> · enter each scoreline and the tables update themselves</div>
  </header>

  <div class="bar">
    <div class="tabs">
      <button class="tab on" data-tab="groups">Mini-Leagues</button>
      <button class="tab" data-tab="players">Player Table</button>
      <button class="tab" data-tab="knockouts">Knockouts</button>
    </div>
    <div class="tools">
      <button class="tbtn primary" id="shareBtn">🔗 Share link</button>
      <button class="tbtn" id="copyBtn">📋 Copy update</button>
      <button class="tbtn" id="expBtn">⤓ Backup</button>
      <button class="tbtn" id="impBtn">⤒ Restore</button>
      <button class="tbtn danger" id="resetBtn">↺ Reset scores</button>
      <input type="file" id="impFile" accept="application/json" style="display:none">
    </div>
  </div>

  <div class="legend">
    <span class="pill"><span class="sw" style="background:var(--pitch)"></span> Top 2 — through</span>
    <span class="pill"><span class="sw" style="background:var(--gold)"></span> 3rd — best-thirds contention</span>
    <span class="pill"><span class="sw" style="background:var(--red)"></span> 4th — out</span>
  </div>

  <div id="groups"></div>
  <div id="players"></div>
  <div id="knockouts"></div>

  <p class="note" id="storenote"></p>
</div>
<div class="toast" id="toast"></div>

<script>
const FLAGS={"United States":"us","Canada":"ca","Mexico":"mx","Curaçao":"cw","Haiti":"ht","Panama":"pa",
"Argentina":"ar","Brazil":"br","Colombia":"co","Ecuador":"ec","Paraguay":"py","Uruguay":"uy","New Zealand":"nz",
"England":"gb-eng","France":"fr","Croatia":"hr","Norway":"no","Portugal":"pt","Germany":"de","Netherlands":"nl",
"Austria":"at","Belgium":"be","Scotland":"gb-sct","Spain":"es","Switzerland":"ch","Sweden":"se","Türkiye":"tr",
"Bosnia & Herz.":"ba","Czechia":"cz","Algeria":"dz","Cape Verde":"cv","Côte d'Ivoire":"ci","Egypt":"eg","Ghana":"gh",
"Morocco":"ma","Senegal":"sn","South Africa":"za","Tunisia":"tn","DR Congo":"cd","Australia":"au","Iran":"ir",
"Japan":"jp","Jordan":"jo","South Korea":"kr","Qatar":"qa","Saudi Arabia":"sa","Uzbekistan":"uz","Iraq":"iq"};
function flag(t){return '<img class="fl" loading="lazy" src="https://flagcdn.com/'+FLAGS[t]+'.svg" alt="'+t+'">';}

// group -> [ [team, owner], x4 ]  (from the works draw; Japan→Ali completes Group F)
const GROUPS={
 A:[["Mexico","Kai"],["South Africa","Taylor"],["South Korea","Taylor"],["Czechia","Bryan"]],
 B:[["Canada","Sharley"],["Bosnia & Herz.","Caroline"],["Qatar","Emma G"],["Switzerland","Taylor"]],
 C:[["Brazil","Sharley"],["Morocco","Geraldine"],["Haiti","Kai"],["Scotland","Neil"]],
 D:[["United States","Ali"],["Australia","Emma G"],["Paraguay","Emma S"],["Türkiye","Lily"]],
 E:[["Germany","Caroline"],["Curaçao","Ali"],["Côte d'Ivoire","Lucy"],["Ecuador","Emma S"]],
 F:[["Netherlands","Caroline"],["Sweden","Anita"],["Tunisia","Emma G"],["Japan","Ali"]],
 G:[["Belgium","Bryan"],["Egypt","Debs"],["Iran","Geraldine"],["New Zealand","Meg"]],
 H:[["Spain","Debs"],["Cape Verde","Kai"],["Saudi Arabia","Bryan"],["Uruguay","Debs"]],
 I:[["France","Hannah"],["Senegal","Sharley"],["Iraq","Lucy"],["Norway","Hannah"]],
 J:[["Argentina","Anita"],["Austria","Hannah"],["Algeria","Lily"],["Jordan","Neil"]],
 K:[["Portugal","Meg"],["DR Congo","Meg"],["Uzbekistan","Anita"],["Colombia","Lily"]],
 L:[["England","Geraldine"],["Croatia","Emma S"],["Ghana","Neil"],["Panama","Lucy"]]
};
const PAIRS=[[0,1],[2,3],[0,2],[1,3],[0,3],[1,2]];
const GL=Object.keys(GROUPS);

const STORE_KEY="wc26works";
let scores={};   // key g-idx -> {a,b}
let ko={r32:Array(32).fill(""), win:{}};
const TEAMS=Object.keys(FLAGS);
const TI={}; TEAMS.forEach((t,i)=>TI[t]=i);
const OWNER_OF={}; GL.forEach(g=>GROUPS[g].forEach(([t,o])=>OWNER_OF[t]=o));
const KO_ROUNDS=[16,8,4,2,1];
const KO_NAMES=["Round of 32","Round of 16","Quarter-finals","Semi-finals","Final"];

function _ok(s){return s&&s.a!==""&&s.b!==""&&s.a!=null&&s.b!=null;}
function encodeGroups(){
  return GL.map(g=>PAIRS.map((_,i)=>{const s=scores[g+"-"+i];return _ok(s)?(s.a+"-"+s.b):"";}).join(".")).join(".");
}
function decodeGroups(str){
  const parts=str.split("."); const obj={}; let k=0;
  GL.forEach(g=>PAIRS.forEach((_,i)=>{const p=parts[k++]; if(p&&p.indexOf("-")>=0){const a=p.split("-")[0],b=p.split("-")[1]; if(a!==""&&b!==undefined&&b!=="") obj[g+"-"+i]={a,b};}}));
  return obj;
}
function koMatchKeys(){const ks=[];KO_ROUNDS.forEach((c,r)=>{for(let m=0;m<c;m++)ks.push(r+"-"+m);});return ks;}
function encodeR32(){return ko.r32.map(t=>t!==""&&TI[t]!=null?TI[t]:"").join(".");}
function decodeR32(str){const a=Array(32).fill("");str.split(".").forEach((p,i)=>{if(i<32&&p!==""){const n=+p;if(TEAMS[n])a[i]=TEAMS[n];}});ko.r32=a;}
function encodeWin(){return koMatchKeys().map(k=>ko.win[k]==="a"?"a":ko.win[k]==="b"?"b":"-").join("");}
function decodeWin(str){const w={};const ks=koMatchKeys();for(let i=0;i<ks.length&&i<str.length;i++){const c=str[i];if(c==="a"||c==="b")w[ks[i]]=c;}ko.win=w;}
function encodeAll(){return [encodeGroups(),encodeR32(),encodeWin()].join("~");}
function applyDecoded(str){const p=str.split("~");scores=decodeGroups(p[0]||"");if(p[1]!=null)decodeR32(p[1]);if(p[2]!=null)decodeWin(p[2]);}
function load(){
  try{const m=location.hash.match(/[#&]d=([^&]+)/); if(m){applyDecoded(decodeURIComponent(m[1])); save(); return;}}catch(e){}
  try{const v=localStorage.getItem(STORE_KEY); if(v){const o=JSON.parse(v); if(o&&o.scores){scores=o.scores||{}; if(o.ko){ko.r32=(o.ko.r32&&o.ko.r32.length===32)?o.ko.r32:Array(32).fill("");ko.win=o.ko.win||{};}} else {scores=o||{};}}}catch(e){}
}
function save(){ try{localStorage.setItem(STORE_KEY,JSON.stringify({scores,ko}));}catch(e){} }
let st; function queueSave(){ clearTimeout(st); st=setTimeout(save,250); }

function valid(s){ return s && s.a!=="" && s.b!=="" && s.a!=null && s.b!=null; }

function computeGroup(g){
  const ts=GROUPS[g].map(([team,owner])=>({team,owner,P:0,W:0,D:0,L:0,GF:0,GA:0}));
  PAIRS.forEach(([i,j],idx)=>{
    const s=scores[g+"-"+idx]; if(!valid(s)) return;
    const ga=+s.a, gb=+s.b, A=ts[i], B=ts[j];
    A.P++;B.P++;A.GF+=ga;A.GA+=gb;B.GF+=gb;B.GA+=ga;
    if(ga>gb){A.W++;B.L++;}else if(gb>ga){B.W++;A.L++;}else{A.D++;B.D++;}
  });
  ts.forEach(t=>{t.GD=t.GF-t.GA;t.Pts=t.W*3+t.D;});
  ts.sort((x,y)=> y.Pts-x.Pts || y.GD-x.GD || y.GF-x.GF || x.team.localeCompare(y.team));
  return ts;
}
function playedIn(g){ let n=0; PAIRS.forEach((_,idx)=>{ if(valid(scores[g+"-"+idx])) n++; }); return n; }

function computePlayers(){
  const m={};
  GL.forEach(g=>{
    computeGroup(g).forEach((t,pos)=>{
      const o=m[t.owner]||(m[t.owner]={name:t.owner,Pts:0,GD:0,GF:0,W:0,teams:[]});
      o.Pts+=t.Pts;o.GD+=t.GD;o.GF+=t.GF;o.W+=t.W;
      o.teams.push({team:t.team,pos:pos+1,played:t.P});
    });
  });
  return Object.values(m).sort((a,b)=> b.Pts-a.Pts || b.GD-a.GD || b.GF-a.GF || a.name.localeCompare(b.name));
}

function rowClass(pos){ return pos<2?"q":pos===2?"q3":"out"; }
function chipClass(pos,played){ if(played===0) return ""; return pos<2?"g":pos===2?"a":"r"; }

/* ---------- build groups once ---------- */
function buildGroups(){
  const wrap=document.getElementById("groups");
  wrap.innerHTML=GL.map(g=>{
    const fx=PAIRS.map(([i,j],idx)=>{
      const ta=GROUPS[g][i][0], tb=GROUPS[g][j][0], key=g+"-"+idx, s=scores[key]||{a:"",b:""};
      return `<div class="match">
        <div class="side">${flag(ta)}<span class="nm">${ta}</span></div>
        <input class="score" inputmode="numeric" data-key="${key}" data-side="a" value="${s.a}">
        <span class="vs">v</span>
        <input class="score" inputmode="numeric" data-key="${key}" data-side="b" value="${s.b}">
        <div class="side r">${flag(tb)}<span class="nm">${tb}</span></div>
      </div>`;
    }).join("");
    return `<div class="gcard">
      <div class="gh"><h2>Group ${g}</h2><span class="played" id="pl-${g}"></span></div>
      <div class="standings" id="st-${g}"></div>
      <button class="fxtoggle" data-fx="${g}">▾ Enter / edit scores</button>
      <div class="fx" id="fx-${g}">${fx}</div>
    </div>`;
  }).join("");
}

function renderStandings(g){
  const ts=computeGroup(g);
  const rows=ts.map((t,pos)=>`<tr class="${rowClass(pos)}">
    <td class="pos">${pos+1}</td>
    <td class="t"><div class="teamcell">${flag(t.team)}<div><div class="nm">${t.team}</div><div class="ow">${t.owner}</div></div></div></td>
    <td>${t.P}</td><td>${t.W}</td><td>${t.D}</td><td>${t.L}</td>
    <td>${t.GD>0?"+":""}${t.GD}</td><td class="pts">${t.Pts}</td></tr>`).join("");
  document.getElementById("st-"+g).innerHTML=
    `<table><thead><tr><th></th><th class="t">Team</th><th>P</th><th>W</th><th>D</th><th>L</th><th title="Goal difference">GD</th><th>Pts</th></tr></thead><tbody>${rows}</tbody></table>`;
  document.getElementById("pl-"+g).textContent=playedIn(g)+"/6 played";
}
function renderAllStandings(){ GL.forEach(renderStandings); }

function renderPlayers(){
  const ps=computePlayers();
  document.getElementById("players").innerHTML=ps.map((p,i)=>{
    const chips=p.teams.sort((a,b)=>a.pos-b.pos).map(t=>
      `<span class="tchip ${chipClass(t.pos,t.played)}">${flag(t.team)}${t.team}</span>`).join("");
    return `<div class="pcard">
      <div class="prank ${i===0?"top":""}">${i+1}</div>
      <div class="pmid"><div class="pname">${p.name}</div><div class="pteams">${chips}</div></div>
      <div class="pstat"><div class="pp">${p.Pts}</div><div class="pl">points</div><div class="gd">GD ${p.GD>0?"+":""}${p.GD}</div></div>
    </div>`;
  }).join("");
}

/* ---------- knockouts ---------- */
function getTeam(r,m,s){
  if(r===0) return ko.r32[m*2+s]||"";
  const pm=m*2+s, w=ko.win[(r-1)+"-"+pm];
  if(!w) return "";
  return getTeam(r-1,pm, w==="a"?0:1);
}
function championInfo(){ const w=ko.win["4-0"]; if(!w) return null; const t=getTeam(4,0,w==="a"?0:1); if(!t) return null; return {team:t,owner:OWNER_OF[t]}; }
function cleanupKO(){let ch=true,p=0;while(ch&&p<6){ch=false;p++;for(let r=0;r<KO_ROUNDS.length;r++)for(let m=0;m<KO_ROUNDS[r];m++){const k=r+"-"+m,w=ko.win[k];if(w){const t=w==="a"?getTeam(r,m,0):getTeam(r,m,1);if(!t){delete ko.win[k];ch=true;}}}}}
function setWinner(r,m,s){const t=getTeam(r,m,s);if(!t)return;ko.win[r+"-"+m]=s===0?"a":"b";cleanupKO();queueSave();renderKO();}
function setR32(idx,team){ko.r32[idx]=team;cleanupKO();queueSave();renderKO();}
function qualifiers(){
  const firsts=[],seconds=[],thirds=[];
  GL.forEach(g=>{const t=computeGroup(g);firsts.push(Object.assign({},t[0],{group:g}));seconds.push(Object.assign({},t[1],{group:g}));thirds.push(Object.assign({},t[2],{group:g}));});
  thirds.sort((a,b)=>b.Pts-a.Pts||b.GD-a.GD||b.GF-a.GF||a.team.localeCompare(b.team));
  return {firsts,seconds,thirdsIn:thirds.slice(0,8),thirdsOut:thirds.slice(8)};
}
function autoFillQualifiers(){
  const q=qualifiers();const list=q.firsts.concat(q.seconds,q.thirdsIn).map(x=>x.team);
  const a=Array(32).fill("");for(let i=0;i<32;i++)a[i]=list[i]||"";ko.r32=a;cleanupKO();queueSave();renderKO();
}
let OPTS=null;
function optionsHTML(){ if(OPTS) return OPTS; const ts=TEAMS.slice().sort((a,b)=>a.localeCompare(b)); OPTS='<option value="">- pick team -</option>'+ts.map(t=>'<option value="'+t+'">'+t+' \u00b7 '+OWNER_OF[t]+'</option>').join(""); return OPTS; }
function optionsFor(sel){ let h=optionsHTML(); if(sel){h=h.replace('<option value="'+sel+'">','<option value="'+sel+'" selected>');} else {h=h.replace('<option value="">','<option value="" selected>');} return h; }
function koSideHTML(r,m,s){
  const team=getTeam(r,m,s), w=ko.win[r+"-"+m], isW=w===(s===0?"a":"b"), isL=w&&!isW&&team;
  if(r===0){
    return '<div class="kside '+(isW?"w":(isL?"l":""))+'"><select class="kselect" data-r32="'+(m*2+s)+'">'+optionsFor(team)+'</select><button class="kpick" data-pick="'+r+'-'+m+'-'+s+'" title="Mark winner">'+(isW?"\u2713":"\u25cf")+'</button></div>';
  }
  if(!team) return '<div class="kside empty"><span class="ktm" style="color:var(--muted2)">-</span></div>';
  return '<div class="kside pickable '+(isW?"w":(isL?"l":""))+'" data-pick="'+r+'-'+m+'-'+s+'">'+flag(team)+'<span class="ktm">'+team+'</span><span class="kow">'+OWNER_OF[team]+'</span></div>';
}
function renderKO(){
  const el=document.getElementById("knockouts"); if(!el) return;
  const ci=championInfo();
  let html = ci
    ? '<div class="champ"><div class="lbl">World Champions</div><div class="team">'+flag(ci.team)+' '+ci.team+'</div><div class="who">\ud83c\udfc6 '+ci.owner+' wins the sweepstake</div></div>'
    : '<div class="champ pending">Set the 16 Round-of-32 ties with the dropdowns (or tap \u201cAuto-fill\u201d to drop the qualifiers in), then tap a team to send it through each round. The champion \u2014 and the sweepstake winner \u2014 appears here once the final is decided.</div>';
  html += '<div class="kbtns"><button class="tbtn" id="koFill">\u2913 Auto-fill 32 qualifiers</button><button class="tbtn danger" id="koClear">\u21ba Clear bracket</button></div>';
  const q=qualifiers();
  html += '<div class="qpanel"><h3>Best third-placed teams (top 8 through)</h3><div class="qrow">'+
    q.thirdsIn.map(t=>'<span class="tchip g">'+flag(t.team)+' '+t.team+' <span style="opacity:.6">'+t.group+'\u00b7'+t.owner+'</span></span>').join("")+'</div>'+
    '<h3 style="margin-top:6px">Thirds missing out</h3><div class="qrow">'+
    (q.thirdsOut.map(t=>'<span class="tchip r">'+flag(t.team)+' '+t.team+' <span style="opacity:.6">'+t.group+'</span></span>').join("")||'<span class="qnote">-</span>')+'</div>'+
    '<div class="qnote">All 12 group winners and 12 runners-up also qualify. Order uses points, then goal difference, then goals scored (real ties may also use head-to-head).</div></div>';
  KO_ROUNDS.forEach((cnt,r)=>{
    let cards=""; for(let m=0;m<cnt;m++) cards+='<div class="kmatch">'+koSideHTML(r,m,0)+koSideHTML(r,m,1)+'</div>';
    html+='<div class="kround"><h3>'+KO_NAMES[r]+'</h3><div class="kgrid">'+cards+'</div></div>';
  });
  el.innerHTML=html;
}

/* ---------- events ---------- */
let playersVisible=false,koVisible=false;
document.getElementById("groups").addEventListener("input",e=>{
  const inp=e.target.closest("input[data-key]"); if(!inp) return;
  let v=inp.value.replace(/[^0-9]/g,"").slice(0,2); inp.value=v;
  const k=inp.dataset.key;
  scores[k]=scores[k]||{a:"",b:""}; scores[k][inp.dataset.side]=v;
  queueSave();
  renderStandings(k.split("-")[0]);
  if(playersVisible) renderPlayers();
  if(koVisible) renderKO();
});
document.getElementById("groups").addEventListener("click",e=>{
  const t=e.target.closest("[data-fx]"); if(!t) return;
  const box=document.getElementById("fx-"+t.dataset.fx);
  const open=box.classList.toggle("open");
  t.textContent=(open?"▴ Hide scores":"▾ Enter / edit scores");
});

function showView(v){
  document.querySelectorAll(".tab").forEach(x=>x.classList.toggle("on",x.dataset.tab===v));
  document.getElementById("groups").classList.toggle("off",v!=="groups");
  document.getElementById("players").classList.toggle("on",v==="players");
  document.getElementById("knockouts").classList.toggle("on",v==="knockouts");
  playersVisible=v==="players"; koVisible=v==="knockouts";
  if(v==="players") renderPlayers();
  if(v==="knockouts") renderKO();
}
document.querySelectorAll(".tab").forEach(tab=>tab.addEventListener("click",()=>showView(tab.dataset.tab)));
document.getElementById("knockouts").addEventListener("click",e=>{
  const pk=e.target.closest("[data-pick]");
  if(pk){const a=pk.dataset.pick.split("-");setWinner(+a[0],+a[1],+a[2]);return;}
  if(e.target.id==="koFill"){autoFillQualifiers();return;}
  if(e.target.id==="koClear"){if(confirm("Clear the whole knockout bracket?")){ko={r32:Array(32).fill(""),win:{}};queueSave();renderKO();}return;}
});
document.getElementById("knockouts").addEventListener("change",e=>{
  const sel=e.target.closest("[data-r32]"); if(!sel) return; setR32(+sel.dataset.r32, sel.value);
});

function toast(msg){const t=document.getElementById("toast");t.textContent=msg;t.classList.add("show");setTimeout(()=>t.classList.remove("show"),1600);}

document.getElementById("shareBtn").addEventListener("click",()=>{
  const base=location.href.split("#")[0];
  const link=base+"#d="+encodeURIComponent(encodeAll());
  navigator.clipboard.writeText(link).then(()=>toast("Share link copied — paste it in the group")).catch(()=>toast("Copy failed"));
});
document.getElementById("copyBtn").addEventListener("click",()=>{
  const ps=computePlayers();
  let games=0; GL.forEach(g=>games+=playedIn(g));
  let txt="⚽ WORLD CUP WORKS SWEEPSTAKE\nStanding after "+games+"/72 group games\n\n";
  const _ci=championInfo(); if(_ci) txt+="🏆 CHAMPION: "+_ci.team+" ("+_ci.owner+") wins the sweepstake!\n\n";
  txt+="— PLAYER TABLE —\n";
  ps.forEach((p,i)=>{ txt+=(i+1)+". "+p.name+" — "+p.Pts+" pts (GD "+(p.GD>0?"+":"")+p.GD+")\n"; });
  txt+="\n— GROUP LEADERS —\n";
  GL.forEach(g=>{ const top=computeGroup(g)[0]; txt+="Group "+g+": "+top.team+" ("+top.owner+")\n"; });
  navigator.clipboard.writeText(txt).then(()=>toast("Update copied — paste in the chat")).catch(()=>toast("Copy failed"));
});
document.getElementById("expBtn").addEventListener("click",()=>{
  const blob=new Blob([JSON.stringify({scores,ko})],{type:"application/json"});
  const a=document.createElement("a");a.href=URL.createObjectURL(blob);a.download="wc-works-scores.json";a.click();
  toast("Backup downloaded");
});
document.getElementById("impBtn").addEventListener("click",()=>document.getElementById("impFile").click());
document.getElementById("impFile").addEventListener("change",e=>{
  const f=e.target.files[0]; if(!f) return; const rd=new FileReader();
  rd.onload=()=>{ try{ const o=JSON.parse(rd.result)||{}; if(o&&o.scores){scores=o.scores||{}; if(o.ko){ko.r32=(o.ko.r32&&o.ko.r32.length===32)?o.ko.r32:Array(32).fill("");ko.win=o.ko.win||{};}} else {scores=o||{};} queueSave(); buildGroups(); renderAllStandings(); renderKO(); if(playersVisible)renderPlayers(); toast("Backup restored"); }catch(err){ toast("Couldn't read file"); } };
  rd.readAsText(f);
});
document.getElementById("resetBtn").addEventListener("click",()=>{
  if(!confirm("Clear all scores and the bracket? This can't be undone.")) return;
  scores={}; ko={r32:Array(32).fill(""),win:{}}; queueSave(); buildGroups(); renderAllStandings(); renderKO(); if(playersVisible)renderPlayers(); toast("All cleared");
});

/* ---------- init ---------- */
(function(){
  load();
  buildGroups(); renderAllStandings();
  const shared=/[#&]d=/.test(location.hash);
  document.getElementById("storenote").textContent = shared
    ? "You're viewing the standings shared by the organiser. Look through the groups and player table — anything you tap stays on your device only and doesn't change the official scores."
    : "Scores save in this browser as you type. After each round, tap “Share link” and post the link in the group so everyone sees the latest standings.";
})();
</script>
</body>
</html>
